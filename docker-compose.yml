services:
  postgres:
    image: postgres:16-alpine
    container_name: mini_lending_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lending_user
      POSTGRES_PASSWORD: lending_password
      POSTGRES_DB: mini_lending
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lending_user -d mini_lending"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
